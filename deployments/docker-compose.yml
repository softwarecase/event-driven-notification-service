services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.0-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  mockprovider:
    image: nginx:alpine
    volumes:
      - ./mock-response.json:/usr/share/nginx/html/index.html
      - ./mock-nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "9999:80"

  migrate:
    image: migrate/migrate
    volumes:
      - ../internal/adapter/repository/postgres/migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable",
      "up"
    ]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      target: api
    ports:
      - "8080:8080"
    environment:
      NOTIFY_SERVER_PORT: "8080"
      NOTIFY_DB_HOST: postgres
      NOTIFY_DB_PORT: "5432"
      NOTIFY_DB_USER: ${POSTGRES_USER}
      NOTIFY_DB_PASSWORD: ${POSTGRES_PASSWORD}
      NOTIFY_DB_NAME: ${POSTGRES_DB}
      NOTIFY_DB_SSL_MODE: disable
      NOTIFY_REDIS_ADDR: redis:6379
      NOTIFY_TRACING_ENDPOINT: jaeger:4318
      NOTIFY_PROVIDER_WEBHOOK_URL: ${WEBHOOK_URL:?Set WEBHOOK_URL in .env - get yours at https://webhook.site}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      target: worker
    environment:
      NOTIFY_DB_HOST: postgres
      NOTIFY_DB_PORT: "5432"
      NOTIFY_DB_USER: ${POSTGRES_USER}
      NOTIFY_DB_PASSWORD: ${POSTGRES_PASSWORD}
      NOTIFY_DB_NAME: ${POSTGRES_DB}
      NOTIFY_DB_SSL_MODE: disable
      NOTIFY_REDIS_ADDR: redis:6379
      NOTIFY_TRACING_ENDPOINT: jaeger:4318
      NOTIFY_PROVIDER_WEBHOOK_URL: ${WEBHOOK_URL:?Set WEBHOOK_URL in .env - get yours at https://webhook.site}
      NOTIFY_WORKER_CONCURRENCY: "5"
      NOTIFY_WORKER_RATE_LIMIT: "100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
